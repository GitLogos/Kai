name: Build Kai Web App

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: false
        default: 'local'
        type: choice
        options:
          - local
          - github-pages

permissions:
  contents: read
  packages: write

env:
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true'

jobs:
  build-web-app:
    name: Build Kai Web App
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '8.11'
          
      - name: Build composeApp for Web
        run: |
          cd composeApp
          ./gradlew :composeApp:wasmJsBrowser
          
      - name: Build with optimizations
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.environment == 'production' }}
        run: |
          cd composeApp
          ./gradlew :composeApp:wasmJsBrowser -x test --max-workers=4
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kai-web-app
          path: composeApp/build/wasmJsBrowser/wasmJsBrowser/wasmJsBrowser
          retention-days: 7
          
      - name: List built files
        run: |
          ls -la composeApp/build/wasmJsBrowser/wasmJsBrowser/wasmJsBrowser/
          find composeApp/build -name "*.js" -type f | head -20
          
  deploy-to-github-pages:
    name: Deploy to GitHub Pages
    needs: build-web-app
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
        contents: read
        pages: write
        id-token: write
        
    environment:
      name: github-pages
      url: ${{ deployment_url }}
      
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Install dependencies
        run: npm install -g serve
          
      - name: Build and Deploy
        run: |
          cd composeApp
          ./gradlew :composeApp:wasmJsBrowser
          
          # Copy built files to _site
          mkdir -p _site
          cp -r composeApp/build/wasmJsBrowser/wasmJsBrowser/wasmJsBrowser/* _site/
          
          # Create index.html if missing
          if [ ! -f _site/index.html ]; then
            cp composeApp/build/wasmJsBrowser/wasmJsBrowser/wasmJsBrowser/index.html _site/
          fi
          
          # Start local server for verification
          npx serve _site -p 8080 &
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
