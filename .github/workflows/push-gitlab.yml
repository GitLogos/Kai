name: Push Kai Web Docker Image to GitHub Container Registry

on:
  push:
    branches:
      - infra
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.0.0, v1.0.0)'
        required: false
        default: 'latest'

env:
  IMAGE_NAME: 'gitlogos/kai-web'
  REGISTRY: 'ghcr.io'
  REGISTRY_USER: '${{ github.actor }}'
  REGISTRY_PASSWORD: '${{ secrets.GITHUB_TOKEN }}'

jobs:
  push-to-ghcr:
    name: Push to GitHub Container Registry
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/infra'
    
    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push to GitHub Container Registry
      - name: Build and push to GitHub Container Registry
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.repository.default_branch }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          platforms:
            - linux/amd64
            - linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Show pushed images
      - name: Show pushed images
        run: |
          echo "✅ Images pushed to GitHub Container Registry:"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.repository.default_branch }}"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
