# Nginx configuration for Kai web app (Compose Multiplatform WASM)

# Serve the compiled WASM application with performance optimizations
# Supports SPA routing, gzip compression, caching, and static file serving

server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;

    # SPA Routing - Essential for Compose Multiplatform
    # All routes redirect to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Performance optimizations for WASM and static assets
    # Cache static files aggressively
    location ~* \.(wasm|js|css|png|jpg|jpeg|gif|svg|ico|pdf|json|txt)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, no-transform";
        access_log off;
    }

    # Temporary files (less aggressive caching)
    location ~* \.(tmp|temp)$ {
        expires 1d;
        access_log off;
    }

    # Gzip compression for text-based resources
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types application/javascript text/javascript text/plain text/css application/json fontwoff fontwoff2 image/webp;
    gzip_proxied any;

    # MIME types
    add_header Content-Type application/json;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Security headers
    add_header Referrer-Policy no-referrer;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # Logging
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;
}

